<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holi Celebration 2026</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
overflow:hidden;
height:100vh;
background:black;
color:white;
}

/* animated gradient layer */
.bg{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(-45deg,#ff0055,#ff9900,#00ccff,#ff00cc);
background-size:400% 400%;
animation:bg 12s infinite ease;
z-index:-2;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* intro */
#intro{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
z-index:10;
}

#intro h1{
font-size:50px;
margin-bottom:20px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%,100%{opacity:1;}
50%{opacity:0.5;}
}

input{
padding:12px;
font-size:18px;
border:none;
border-radius:10px;
outline:none;
}

button{
padding:12px 30px;
font-size:18px;
border:none;
border-radius:30px;
margin-top:15px;
cursor:pointer;
background:white;
color:#ff0066;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

/* main content */
#main{
display:none;
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

#title{
font-size:80px;
text-shadow:0 0 20px white,0 0 40px pink;
animation:float 4s infinite ease-in-out;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-20px);}
}

#date{
font-size:25px;
margin-top:10px;
}

/* particles */
.particle{
position:absolute;
width:10px;
height:10px;
border-radius:50%;
pointer-events:none;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh);
opacity:0;
}
}

/* fireworks */
.fire{
position:absolute;
width:8px;
height:8px;
border-radius:50%;
animation:explode 1.2s forwards;
}

@keyframes explode{
to{
transform:scale(20);
opacity:0;
}
}

/* mouse trail */
.trail{
position:absolute;
width:20px;
height:20px;
border-radius:50%;
pointer-events:none;
background:radial-gradient(circle,white,transparent);
animation:fade 1s forwards;
}

@keyframes fade{
to{
opacity:0;
transform:scale(3);
}
}
</style>
</head>
<body>

<div class="bg"></div>

<div id="intro">
<h1>Holi 2026 🌈</h1>
<input type="text" id="nameInput" placeholder="Enter your name">
<button onclick="start()">Enter Celebration</button>
</div>

<div id="main">
<div id="title">Happy Holi 🎉</div>
<div id="date">3 March 2026</div>
</div>

<audio id="music" loop>
<source src="holi.mp3" type="audio/mpeg">
</audio>

<script>
const colors=["#ff0000","#ffff00","#00ffcc","#ff00ff","#ff8800","#00aaff"];

// start celebration
function start(){
let name=document.getElementById("nameInput").value;
if(name!=""){
document.getElementById("title").innerHTML="Happy Holi "+name+" 🎉";
}
document.getElementById("intro").style.display="none";
document.getElementById("main").style.display="flex";
document.getElementById("music").play();
fireworks();
}

// falling gulal
function particle(){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*window.innerWidth+"px";
p.style.background=colors[Math.floor(Math.random()*colors.length)];
p.style.animationDuration=(3+Math.random()*4)+"s";
document.body.appendChild(p);
setTimeout(()=>p.remove(),7000);
}
setInterval(particle,80);

// fireworks
function fireworks(){
setInterval(()=>{
let x=Math.random()*window.innerWidth;
let y=Math.random()*window.innerHeight;
for(let i=0;i<20;i++){
let f=document.createElement("div");
f.className="fire";
f.style.left=x+"px";
f.style.top=y+"px";
f.style.background=colors[Math.floor(Math.random()*colors.length)];
f.style.transform=`translate(${(Math.random()-0.5)*200}px,${(Math.random()-0.5)*200}px)`;
document.body.appendChild(f);
setTimeout(()=>f.remove(),1200);
}
},1500);
}

// mouse glow trail
document.addEventListener("mousemove",(e)=>{
let t=document.createElement("div");
t.className="trail";
t.style.left=e.clientX+"px";
t.style.top=e.clientY+"px";
document.body.appendChild(t);
setTimeout(()=>t.remove(),1000);
});
</script>

</body>
</html>
