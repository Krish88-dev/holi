<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- Fixed Desktop View -->
<meta name="viewport" content="width=1400, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Holi Celebration 2026</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

/* LOCK SCREEN SIZE */
html,body{
width:1400px;
height:800px;
overflow:hidden;
background:black;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
touch-action:none;
}

/* animated gradient layer */
.bg{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(-45deg,#ff0055,#ff9900,#00ccff,#ff00cc);
background-size:400% 400%;
animation:bg 12s infinite ease;
z-index:-2;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* intro */
#intro{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
z-index:10;
}

#intro h1{
font-size:50px;
margin-bottom:20px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%,100%{opacity:1;}
50%{opacity:0.5;}
}

input{
padding:12px;
font-size:18px;
border:none;
border-radius:10px;
outline:none;
}

button{
padding:12px 30px;
font-size:18px;
border:none;
border-radius:30px;
margin-top:15px;
cursor:pointer;
background:white;
color:#ff0066;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

/* main content */
#main{
display:none;
position:absolute;
width:100%;
height:100%;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

#title{
font-size:80px;
text-shadow:0 0 20px white,0 0 40px pink;
animation:float 4s infinite ease-in-out;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-20px);}
}

#date{
font-size:25px;
margin-top:10px;
}

/* particles */
.particle{
position:absolute;
width:10px;
height:10px;
border-radius:50%;
pointer-events:none;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(800px);
opacity:0;
}
}

/* fireworks */
.fire{
position:absolute;
width:8px;
height:8px;
border-radius:50%;
pointer-events:none;
animation:explode 1.2s forwards;
}

@keyframes explode{
to{
transform:scale(20);
opacity:0;
}
}

/* mouse/touch trail */
.trail{
position:absolute;
width:20px;
height:20px;
border-radius:50%;
pointer-events:none;
background:radial-gradient(circle,white,transparent);
animation:fade 0.6s forwards;
}

@keyframes fade{
to{
opacity:0;
transform:scale(3);
}
}
</style>
</head>

<body>

<div class="bg"></div>

<div id="intro">
<h1>Holi 2026 🌈</h1>
<input type="text" id="nameInput" placeholder="Enter your name">
<button onclick="start()">Enter Celebration</button>
</div>

<div id="main">
<div id="title">Happy Holi 🎉</div>
<div id="date">3 March 2026</div>
</div>

<audio id="music" loop>
<source src="holi.mp3" type="audio/mpeg">
</audio>

<script>
const colors=["#ff0000","#ffff00","#00ffcc","#ff00ff","#ff8800","#00aaff"];

// Disable zoom
window.addEventListener('wheel', function(e){
if(e.ctrlKey) e.preventDefault();
}, { passive: false });

window.addEventListener('keydown', function(e){
if((e.ctrlKey && (e.key === '+' || e.key === '-' || e.key === '='))){
e.preventDefault();
}
});

// Start celebration
function start(){
let name=document.getElementById("nameInput").value;
if(name!=""){
document.getElementById("title").innerHTML="Happy Holi "+name+" 🎉";
}
document.getElementById("intro").style.display="none";
document.getElementById("main").style.display="flex";
document.getElementById("music").play();
startFireworks();
}

// Falling particles
function particle(){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*1400+"px";
p.style.background=colors[Math.floor(Math.random()*colors.length)];
p.style.animationDuration=(3+Math.random()*4)+"s";
document.body.appendChild(p);
setTimeout(()=>p.remove(),7000);
}
setInterval(particle,100);

// Fireworks engine
function startFireworks(){
setInterval(()=>{
let x=Math.random()*1400;
let y=Math.random()*800;
firework(x,y);
},2000);
}

// Firework burst
function firework(x,y){
for(let i=0;i<25;i++){
let f=document.createElement("div");
f.className="fire";
f.style.left=x+"px";
f.style.top=y+"px";
f.style.background=colors[Math.floor(Math.random()*colors.length)];
f.style.transform=
`translate(${(Math.random()-0.5)*200}px,
${(Math.random()-0.5)*200}px)`;
document.body.appendChild(f);
setTimeout(()=>f.remove(),1000);
}
}

// Pointer events (Mouse + Touch unified)
document.addEventListener("pointermove",(e)=>{
createTrail(e.clientX,e.clientY);
});

document.addEventListener("pointerdown",(e)=>{
firework(e.clientX,e.clientY);
});

// Trail creator
function createTrail(x,y){
let t=document.createElement("div");
t.className="trail";
t.style.left=x+"px";
t.style.top=y+"px";
document.body.appendChild(t);
setTimeout(()=>t.remove(),600);
}
</script>

</body>
</html>
